name: Deploy to Droplet

on:
  push:
    branches: [main]
    paths:
      - "workspace/Dockerfile.gog"
      - "workspace/docker-compose.droplet.yml"
      - "github-pr-bridge/**"
      - "trello-pipeline/**"
      - "trello-routines/**"
      - "trello-gateway/**"
      - "Caddyfile.droplet"
      - ".github/workflows/deploy-droplet.yml"
  schedule:
    # Nightly at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: deploy-droplet-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy workspace deployment files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "workspace/Dockerfile.gog,workspace/docker-compose.droplet.yml"
          target: "/home/deploy/openclaw/.deploy-tmp"
          strip_components: 1

      - name: Copy Caddyfile to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "Caddyfile.droplet"
          target: "/home/deploy/openclaw/.deploy-tmp-root"

      - name: Copy GitHub PR bridge to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "github-pr-bridge/*"
          target: "/home/deploy/openclaw/.deploy-tmp-github-pr-bridge"

      - name: Copy trello-routines to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-routines/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-routines"

      - name: Copy trello-pipeline to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-pipeline/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-pipeline"

      - name: Copy trello-gateway to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-gateway/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-gateway"

      - name: Apply files, rebuild, and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            mkdir -p /home/deploy/openclaw
            cp /home/deploy/openclaw/.deploy-tmp/Dockerfile.gog /home/deploy/openclaw/Dockerfile.gog
            cp /home/deploy/openclaw/.deploy-tmp/docker-compose.droplet.yml /home/deploy/openclaw/docker-compose.yml
            cp /home/deploy/openclaw/.deploy-tmp-root/Caddyfile.droplet /home/deploy/openclaw/Caddyfile.droplet
            mkdir -p /home/deploy/openclaw/github-pr-bridge
            cp /home/deploy/openclaw/.deploy-tmp-github-pr-bridge/github-pr-bridge/* /home/deploy/openclaw/github-pr-bridge/
            mkdir -p /home/deploy/openclaw/trello-routines
            cp /home/deploy/openclaw/.deploy-tmp-trello-routines/trello-routines/* /home/deploy/openclaw/trello-routines/
            mkdir -p /home/deploy/openclaw/trello-pipeline
            cp /home/deploy/openclaw/.deploy-tmp-trello-pipeline/trello-pipeline/* /home/deploy/openclaw/trello-pipeline/
            mkdir -p /home/deploy/openclaw/trello-gateway
            for f in Dockerfile deploy.sh trello_card_contract.mjs trello_gateway.mjs trello_transition_matrix.csv .env.example; do
              cp "/home/deploy/openclaw/.deploy-tmp-trello-gateway/trello-gateway/$f" "/home/deploy/openclaw/trello-gateway/$f"
            done
            chmod 700 /home/deploy/openclaw/trello-gateway/trello_gateway.mjs
            chmod +x /home/deploy/openclaw/trello-gateway/deploy.sh
            # Validate candidate first; install + reload only after a successful validation.
            sudo caddy validate --config /home/deploy/openclaw/Caddyfile.droplet
            sudo install -m 0644 /home/deploy/openclaw/Caddyfile.droplet /etc/caddy/Caddyfile
            sudo systemctl reload caddy
            cd /home/deploy/openclaw
            docker compose build openclaw-gateway trello-gateway
            docker compose up -d --force-recreate openclaw-gateway openclaw-cli trello-bridge github-pr-bridge trello-gateway trello-queue-worker trello-routines
            # github-pr-bridge binds shortly after container start; retry instead of one-shot curl.
            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${GITHUB_PR_BRIDGE_PORT:-19091}/healthz" >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "github-pr-bridge health check failed after 30 attempts" >&2
                exit 1
              fi
              sleep 2
            done
            docker compose ps
