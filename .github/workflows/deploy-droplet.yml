name: Deploy to Droplet

on:
  push:
    branches: [main]
    paths:
      - "workspace/Dockerfile.gog"
      - "workspace/docker-compose.droplet.yml"
      - "Caddyfile.droplet"
      - ".github/workflows/deploy-droplet.yml"
  workflow_dispatch:

concurrency:
  group: deploy-droplet-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "workspace/Dockerfile.gog,workspace/docker-compose.droplet.yml,Caddyfile.droplet"
          target: "/root/openclaw/.deploy-tmp"
          strip_components: 1

      - name: Apply files, rebuild, and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            mkdir -p /root/openclaw
            cp /root/openclaw/.deploy-tmp/Dockerfile.gog /root/openclaw/Dockerfile.gog
            cp /root/openclaw/.deploy-tmp/docker-compose.droplet.yml /root/openclaw/docker-compose.yml
            cp /root/openclaw/.deploy-tmp/Caddyfile.droplet /root/openclaw/Caddyfile.droplet
            cd /root/openclaw
            docker compose build openclaw-gateway
            docker compose up -d --force-recreate openclaw-gateway openclaw-cli
            docker compose ps
