name: Deploy to Droplet

on:
  # Push-to-main deploy paused — restarts kill in-flight Marcos PR hook sessions.
  # Deploy manually: Actions → Deploy to Droplet → Run workflow.
  # To re-enable merge deploys, restore the push block below (see git history).
  schedule:
    # Nightly at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: deploy-droplet-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy workspace deployment files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "workspace/Dockerfile.gog,workspace/docker-compose.droplet.yml"
          target: "/home/deploy/openclaw/.deploy-tmp"
          strip_components: 1

      - name: Copy Caddyfile to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "Caddyfile.droplet"
          target: "/home/deploy/openclaw/.deploy-tmp-root"

      - name: Copy GitHub PR bridge to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "github-pr-bridge/*"
          target: "/home/deploy/openclaw/.deploy-tmp-github-pr-bridge"

      - name: Copy Gmail hook bridge to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "gmail-hook-bridge/*"
          target: "/home/deploy/openclaw/.deploy-tmp-gmail-hook-bridge"

      - name: Copy GOG canary bridge to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "gog-canary-bridge/*"
          target: "/home/deploy/openclaw/.deploy-tmp-gog-canary-bridge"

      - name: Copy trello-routines to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-routines/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-routines"

      - name: Copy trello-pipeline to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-pipeline/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-pipeline"

      - name: Copy manual ops scripts to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "scripts/manual/*"
          target: "/home/deploy/openclaw/.deploy-tmp-scripts-manual"

      - name: Copy deploy manifest to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "deploy/manifest.json"
          target: "/home/deploy/openclaw/.deploy-tmp-deploy"

      - name: Copy live OpenClaw config template to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "config/live/**"
          target: "/home/deploy/openclaw/.deploy-tmp-live-config"

      - name: Copy ops scripts to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "scripts/backup-droplet.sh,scripts/deploy-droplet-remote.sh,scripts/monitor-github-pr-bridge.sh,scripts/monitor-bridge.sh,scripts/sync-live-config.sh,scripts/sync-live-config.mjs,scripts/sanitize-live-config.mjs"
          target: "/home/deploy/openclaw/.deploy-tmp-ops-scripts"

      - name: Copy Cheryl wiki maintainer runtime to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "runtime/cheryl/wiki-maintainer/**"
          target: "/home/deploy/openclaw/.deploy-tmp-cheryl-wiki-maintainer"

      - name: Copy shared modules to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "shared/*"
          target: "/home/deploy/openclaw/.deploy-tmp-shared"

      - name: Copy task-board to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "task-board/*"
          target: "/home/deploy/openclaw/.deploy-tmp-task-board"

      - name: Copy trello-gateway to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-gateway/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-gateway"

      - name: Copy qmd host config to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "deploy/host-config/qmd/index.yml"
          target: "/home/deploy/openclaw/.deploy-tmp-qmd-host-config"

      - name: Apply files, rebuild, restart, and smoke-test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          envs: GITHUB_SHA,GITHUB_REF
          script_stop: true
          script: |
            set -eu
            export GITHUB_SHA="${{ github.sha }}"
            export GITHUB_REF="${{ github.ref }}"
            bash "${HOME}/openclaw/.deploy-tmp-ops-scripts/scripts/deploy-droplet-remote.sh"
