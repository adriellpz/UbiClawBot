name: Deploy to Droplet

on:
  push:
    branches: [main]
    paths:
      - "workspace/**"
      - "github-pr-bridge/**"
      - "trello-pipeline/**"
      - "trello-routines/**"
      - "trello-gateway/**"
      - "scripts/manual/**"
      - "scripts/backup-droplet.sh"
      - "scripts/monitor-github-pr-bridge.sh"
      - "scripts/sync-live-config.sh"
      - "scripts/sync-live-config.mjs"
      - "scripts/sanitize-live-config.mjs"
      - "config/live/**"
      - "deploy/**"
      - "Caddyfile.droplet"
      - ".github/workflows/deploy-droplet.yml"
  schedule:
    # Nightly at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: deploy-droplet-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy workspace deployment files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "workspace/Dockerfile.gog,workspace/docker-compose.droplet.yml"
          target: "/home/deploy/openclaw/.deploy-tmp"
          strip_components: 1

      - name: Copy Caddyfile to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "Caddyfile.droplet"
          target: "/home/deploy/openclaw/.deploy-tmp-root"

      - name: Copy GitHub PR bridge to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "github-pr-bridge/*"
          target: "/home/deploy/openclaw/.deploy-tmp-github-pr-bridge"

      - name: Copy trello-routines to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-routines/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-routines"

      - name: Copy trello-pipeline to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-pipeline/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-pipeline"

      - name: Copy manual ops scripts to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "scripts/manual/*"
          target: "/home/deploy/openclaw/.deploy-tmp-scripts-manual"

      - name: Copy deploy manifest to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "deploy/manifest.json"
          target: "/home/deploy/openclaw/.deploy-tmp-deploy"

      - name: Copy live OpenClaw config template to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "config/live/**"
          target: "/home/deploy/openclaw/.deploy-tmp-live-config"

      - name: Copy ops scripts to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "scripts/backup-droplet.sh,scripts/monitor-github-pr-bridge.sh,scripts/sync-live-config.sh,scripts/sync-live-config.mjs,scripts/sanitize-live-config.mjs"
          target: "/home/deploy/openclaw/.deploy-tmp-ops-scripts"

      - name: Copy trello-gateway to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: "trello-gateway/*"
          target: "/home/deploy/openclaw/.deploy-tmp-trello-gateway"

      - name: Apply files, rebuild, restart, and smoke-test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          envs: GITHUB_SHA,GITHUB_REF
          script_stop: true
          script: |
            set -eu
            OPENCLAW_ROOT=/home/deploy/openclaw

            smoke_required_file() {
              local rel="$1"
              if [ ! -f "${OPENCLAW_ROOT}/${rel}" ]; then
                echo "smoke failed: missing file ${rel}" >&2
                exit 1
              fi
            }

            smoke_http() {
              local url="$1"
              local label="$2"
              for attempt in $(seq 1 30); do
                if curl -fsS "$url" >/dev/null; then
                  return 0
                fi
                if [ "$attempt" -eq 30 ]; then
                  echo "smoke failed: ${label} ${url}" >&2
                  exit 1
                fi
                sleep 2
              done
            }

            # Assert a running compose service has the listed env vars set non-empty.
            # Guards against an edited .env silently dropping a secret a service needs
            # (e.g. the trello-bridge fallback poll going dark on missing Trello creds).
            smoke_required_env() {
              local svc="$1"
              shift
              local var val
              for var in "$@"; do
                val="$(docker compose exec -T "$svc" sh -c "printenv ${var} || true" 2>/dev/null | tr -d '\r\n')"
                if [ -z "$val" ]; then
                  echo "smoke failed: service ${svc} is missing required env ${var} — check /home/deploy/openclaw/.env" >&2
                  exit 1
                fi
              done
            }

            # Verify a public Caddy route actually reaches its upstream container,
            # not a 502/504. github-pr-bridge shares openclaw-gateway's network
            # namespace (network_mode: service:openclaw-gateway); if the gateway is
            # recreated without also recreating the bridge, the bridge stays pinned to
            # the dead namespace, its self-probing healthcheck still reports "healthy",
            # and Caddy returns 502 on every webhook — silently dropping PR review
            # cards. Any non-5xx response (e.g. a 401 signature reject) proves the full
            # Caddy -> docker-proxy -> bridge chain is intact. --resolve pins the SNI
            # host to loopback so this works without relying on public DNS/hairpin NAT.
            smoke_public_route() {
              local host="$1"
              local pathq="$2"
              local label="$3"
              local code
              for attempt in $(seq 1 30); do
                code="$(curl -s -o /dev/null -m 8 -w '%{http_code}' \
                  --resolve "${host}:443:127.0.0.1" \
                  -X POST "https://${host}${pathq}" \
                  -H 'Content-Type: application/json' -d '{}' 2>/dev/null || true)"
                code="${code:-000}"
                case "$code" in
                  000|5*) ;;
                  *) return 0 ;;
                esac
                if [ "$attempt" -eq 30 ]; then
                  echo "smoke failed: ${label} https://${host}${pathq} returned ${code} (upstream unreachable — likely a stale github-pr-bridge netns; recreate it alongside openclaw-gateway)" >&2
                  exit 1
                fi
                sleep 2
              done
            }

            write_deployed_revision() {
              local deployed_at
              deployed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              printf '%s\n' \
                '{' \
                "  \"gitSha\": \"${GITHUB_SHA:-unknown}\"," \
                "  \"gitRef\": \"${GITHUB_REF:-unknown}\"," \
                "  \"deployedAt\": \"${deployed_at}\"," \
                "  \"workflow\": \"deploy-droplet.yml\"," \
                "  \"manifestVersion\": 1" \
                '}' \
                > "${OPENCLAW_ROOT}/deployed-revision.json"
            }

            mkdir -p "${OPENCLAW_ROOT}"
            cp /home/deploy/openclaw/.deploy-tmp/Dockerfile.gog /home/deploy/openclaw/Dockerfile.gog
            cp /home/deploy/openclaw/.deploy-tmp/docker-compose.droplet.yml /home/deploy/openclaw/docker-compose.yml
            cp /home/deploy/openclaw/.deploy-tmp-root/Caddyfile.droplet /home/deploy/openclaw/Caddyfile.droplet
            mkdir -p /home/deploy/openclaw/github-pr-bridge
            cp /home/deploy/openclaw/.deploy-tmp-github-pr-bridge/github-pr-bridge/* /home/deploy/openclaw/github-pr-bridge/
            mkdir -p /home/deploy/openclaw/trello-routines
            cp /home/deploy/openclaw/.deploy-tmp-trello-routines/trello-routines/* /home/deploy/openclaw/trello-routines/
            mkdir -p /home/deploy/openclaw/trello-pipeline
            cp /home/deploy/openclaw/.deploy-tmp-trello-pipeline/trello-pipeline/* /home/deploy/openclaw/trello-pipeline/
            mkdir -p /home/deploy/openclaw/scripts/manual
            cp /home/deploy/openclaw/.deploy-tmp-scripts-manual/scripts/manual/* /home/deploy/openclaw/scripts/manual/
            mkdir -p /home/deploy/openclaw/deploy
            cp /home/deploy/openclaw/.deploy-tmp-deploy/deploy/manifest.json /home/deploy/openclaw/deploy/manifest.json
            mkdir -p /home/deploy/openclaw/config/live
            cp -r /home/deploy/openclaw/.deploy-tmp-live-config/config/live/. /home/deploy/openclaw/config/live/
            cp /home/deploy/openclaw/.deploy-tmp-ops-scripts/scripts/backup-droplet.sh /home/deploy/openclaw/scripts/backup-droplet.sh
            cp /home/deploy/openclaw/.deploy-tmp-ops-scripts/scripts/monitor-github-pr-bridge.sh /home/deploy/openclaw/scripts/monitor-github-pr-bridge.sh
            cp /home/deploy/openclaw/.deploy-tmp-ops-scripts/scripts/sync-live-config.sh /home/deploy/openclaw/scripts/sync-live-config.sh
            cp /home/deploy/openclaw/.deploy-tmp-ops-scripts/scripts/sync-live-config.mjs /home/deploy/openclaw/scripts/sync-live-config.mjs
            cp /home/deploy/openclaw/.deploy-tmp-ops-scripts/scripts/sanitize-live-config.mjs /home/deploy/openclaw/scripts/sanitize-live-config.mjs
            chmod +x /home/deploy/openclaw/scripts/backup-droplet.sh /home/deploy/openclaw/scripts/monitor-github-pr-bridge.sh /home/deploy/openclaw/scripts/sync-live-config.sh

            # Ensure the github-pr-bridge runtime watchdog is scheduled. This deploy runs
            # as the deploy user (in the docker group), so the cron entry runs as deploy
            # with no root/socket needed. Idempotent: replace only our own line.
            ( crontab -l 2>/dev/null | grep -v "monitor-github-pr-bridge.sh"; \
              echo "*/3 * * * * /home/deploy/openclaw/scripts/monitor-github-pr-bridge.sh >/dev/null 2>&1" ) | crontab -
            mkdir -p /home/deploy/openclaw/trello-gateway
            for f in Dockerfile deploy.sh trello_card_contract.mjs trello_gateway.mjs trello_transition_matrix.csv .env.example; do
              cp "/home/deploy/openclaw/.deploy-tmp-trello-gateway/trello-gateway/$f" "/home/deploy/openclaw/trello-gateway/$f"
            done
            chmod 700 /home/deploy/openclaw/trello-gateway/trello_gateway.mjs
            chmod +x /home/deploy/openclaw/trello-gateway/deploy.sh

            smoke_required_file "scripts/manual/backfill_routine_card_due.mjs"
            smoke_required_file "scripts/manual/backfill_calendar_links_to_description.mjs"
            smoke_required_file "trello-routines/ensure_routines.mjs"
            smoke_required_file "trello-pipeline/server.mjs"
            smoke_required_file "trello-gateway/trello_gateway.mjs"
            smoke_required_file "github-pr-bridge/server.mjs"
            smoke_required_file "docker-compose.yml"
            smoke_required_file "deploy/manifest.json"
            smoke_required_file "config/live/openclaw.json"
            smoke_required_file "scripts/sync-live-config.sh"
            smoke_required_file "scripts/monitor-github-pr-bridge.sh"

            cd "${OPENCLAW_ROOT}"
            bash scripts/sync-live-config.sh

            cd "${OPENCLAW_ROOT}"
            docker compose build openclaw-gateway trello-gateway
            # github-pr-bridge MUST be recreated in the same up as openclaw-gateway:
            # it shares the gateway's network namespace, so recreating the gateway
            # alone leaves the bridge pinned to a dead namespace (502 on every webhook).
            docker compose up -d --force-recreate openclaw-gateway openclaw-cli trello-bridge github-pr-bridge trello-gateway trello-queue-worker trello-routines

            smoke_http "http://127.0.0.1:18792/healthz" "trello-gateway"
            smoke_http "http://127.0.0.1:${GITHUB_PR_BRIDGE_PORT:-19091}/healthz" "github-pr-bridge"
            smoke_http "http://127.0.0.1:18990/health" "trello-bridge"

            # End-to-end public check: confirm Caddy can actually reach github-pr-bridge
            # (the local /healthz above only proves the bridge answers inside its own
            # netns, which stays true even when that netns is the dead one). Derive the
            # site host from the Caddyfile so we don't hardcode it here.
            PUBLIC_HOST="$(awk '!/^#/ && /\{[ \t]*$/ {sub(/[ \t]*\{[ \t]*$/,""); print; exit}' /home/deploy/openclaw/Caddyfile.droplet)"
            smoke_public_route "${PUBLIC_HOST:-ai.sonofwolf.org}" "/github-pr" "github-pr public route"

            # Trello credentials power the bridge webhook-miss fallback poll and the
            # gateway's API calls. A missing key degrades silently, so fail the deploy.
            smoke_required_env trello-bridge TRELLO_API_KEY TRELLO_API_TOKEN
            smoke_required_env trello-gateway TRELLO_API_KEY TRELLO_API_TOKEN

            write_deployed_revision
            cat "${OPENCLAW_ROOT}/deployed-revision.json"

            if cmp -s /home/deploy/openclaw/Caddyfile.droplet /etc/caddy/Caddyfile 2>/dev/null; then
              echo "Caddyfile unchanged — skipping validate/install/reload"
            else
              sudo caddy validate --config /home/deploy/openclaw/Caddyfile.droplet
              sudo install -m 0644 /home/deploy/openclaw/Caddyfile.droplet /etc/caddy/Caddyfile
              if ! sudo systemctl reload caddy; then
                echo "caddy reload failed; journal follows, then restart" >&2
                sudo journalctl -u caddy.service -n 30 --no-pager >&2 || true
                sudo systemctl restart caddy
              fi
            fi
            docker compose ps
