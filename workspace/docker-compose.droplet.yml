# Droplet compose: upstream OpenClaw + gogcli (`gog`) baked in.
# With XDG_CONFIG_HOME=/home/node/.openclaw, gog stores OAuth under the OpenClaw config volume:
# host: ${OPENCLAW_CONFIG_DIR}/gogcli  ->  container: /home/node/.openclaw/gogcli
# Do not mount a separate ~/.config/gogcli path; it conflicts with XDG and confuses `gog`.
services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gog
      args:
        BASE_IMAGE: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.4.23}
    image: openclaw-with-gog:local
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
      OTEL_SEMCONV_STABILITY_OPT_IN: ${OTEL_SEMCONV_STABILITY_OPT_IN:-}
      OPENCLAW_OTEL_PRELOADED: ${OPENCLAW_OTEL_PRELOADED:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # gog (gogcli): file keyring + password so OAuth tokens survive container recreates
      # Set GOG_KEYRING_PASSWORD in /home/deploy/openclaw/.env (same value as used for `gog auth add --manual`)
      GOG_KEYRING_BACKEND: ${GOG_KEYRING_BACKEND:-file}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      GOG_ACCOUNT: ${GOG_ACCOUNT:-}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
      # GitHub: `gh` reads GH_TOKEN / GITHUB_TOKEN (OpenClaw env precedence: docs/help/environment.md).
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GIT_TERMINAL_PROMPT: "0"
      # Netlify: personal access token for Netlify CLI / MCP.
      NETLIFY_AUTH_TOKEN: ${NETLIFY_AUTH_TOKEN:-}
      # GitHub PR webhook intake sidecar
      GITHUB_PR_WEBHOOK_SECRET: ${GITHUB_PR_WEBHOOK_SECRET:-}
      GITHUB_PR_BRIDGE_PORT: ${GITHUB_PR_BRIDGE_PORT:-19091}
      TRELLO_BOARD_ID: ${TRELLO_BOARD_ID:-}
      TRELLO_INTAKE_LIST_ID: ${TRELLO_INTAKE_LIST_ID:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_AGENT_VAULT_DIR:-/home/deploy/openclaw/data/agent-vault}:/home/node/.openclaw/agent-vault
      - ${OPENCLAW_AGENT_RUNTIME_DIR:-/home/deploy/openclaw/data/agent-runtime}:/home/node/.openclaw/agent-runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "127.0.0.1:${TRELLO_BRIDGE_PORT:-18990}:18990"
      - "127.0.0.1:${GITHUB_PR_BRIDGE_PORT:-19091}:${GITHUB_PR_BRIDGE_PORT:-19091}"
      - "127.0.0.1:${GMAIL_HOOK_BRIDGE_PORT:-19092}:${GMAIL_HOOK_BRIDGE_PORT:-19092}"
      - "127.0.0.1:${GOG_CANARY_BRIDGE_PORT:-19093}:${GOG_CANARY_BRIDGE_PORT:-19093}"
      # gog gmail watch serve (hooks.gmail) — Caddy on host proxies /gmail-pubsub here
      - "127.0.0.1:${OPENCLAW_GMAIL_WATCH_PORT:-8788}:8788"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      # Gateway answers HTTP after plugins load; channel/sidecar bootstrap can block the loop for minutes — avoid marking unhealthy during that window.
      start_period: 240s

  openclaw-cli:
    image: openclaw-with-gog:local
    network_mode: "service:openclaw-gateway"
    env_file:
      - path: .env
        required: false
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      GOG_KEYRING_BACKEND: ${GOG_KEYRING_BACKEND:-file}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      GOG_ACCOUNT: ${GOG_ACCOUNT:-}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GIT_TERMINAL_PROMPT: "0"
      NETLIFY_AUTH_TOKEN: ${NETLIFY_AUTH_TOKEN:-}
      GITHUB_PR_WEBHOOK_SECRET: ${GITHUB_PR_WEBHOOK_SECRET:-}
      GITHUB_PR_BRIDGE_PORT: ${GITHUB_PR_BRIDGE_PORT:-19091}
      TRELLO_BOARD_ID: ${TRELLO_BOARD_ID:-}
      TRELLO_INTAKE_LIST_ID: ${TRELLO_INTAKE_LIST_ID:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_AGENT_VAULT_DIR:-/home/deploy/openclaw/data/agent-vault}:/home/node/.openclaw/agent-vault
      - ${OPENCLAW_AGENT_RUNTIME_DIR:-/home/deploy/openclaw/data/agent-runtime}:/home/node/.openclaw/agent-runtime
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

  trello-bridge:
    image: openclaw-with-gog:local
    network_mode: "service:openclaw-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      # Must match the container-side port published by openclaw-gateway above.
      PORT: "18990"
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
      TRELLO_GATEWAY_URL: ${TRELLO_GATEWAY_URL:-http://trello-gateway:18792}
      TRELLO_GATEWAY_KEY: ${TRELLO_GATEWAY_KEY:-}
      TRELLO_BRIDGE_TOKEN: ${TRELLO_BRIDGE_TOKEN:-}
      TRELLO_APP_SECRET: ${TRELLO_APP_SECRET:-}
      TRELLO_CALLBACK_URL: ${TRELLO_CALLBACK_URL:-}
      TRELLO_BOARD_ID: ${TRELLO_BOARD_ID:-}
      OPENCLAW_HOOK_URL: ${OPENCLAW_HOOK_URL:-}
      OPENCLAW_HOOK_TOKEN: ${OPENCLAW_HOOK_TOKEN:-}
      TRELLO_PIPELINE_STATE_DIR: ${TRELLO_PIPELINE_STATE_DIR:-/var/lib/trello-pipeline}
      # Poll fallback reads Trello API creds from trello-gateway/.env only (not main .env).
      TRELLO_PIPELINE_ENV_FILE: /opt/trello-gateway/.env
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ./trello-pipeline:/opt/trello-pipeline:ro
      - ./shared:/opt/shared:ro
      - ./trello-gateway/.env:/opt/trello-gateway/.env:ro
      - ${TRELLO_PIPELINE_HOST_STATE_DIR:-/home/deploy/openclaw/data/trello-pipeline}:/var/lib/trello-pipeline
    working_dir: /opt/trello-pipeline
    command: ["node", "server.mjs"]
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_started
      trello-gateway:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18990/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  github-pr-bridge:
    image: openclaw-with-gog:local
    network_mode: "service:openclaw-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      GITHUB_PR_BRIDGE_PORT: ${GITHUB_PR_BRIDGE_PORT:-19091}
      GITHUB_PR_MAX_BODY_BYTES: ${GITHUB_PR_MAX_BODY_BYTES:-1048576}
      GITHUB_PR_WEBHOOK_SECRET: ${GITHUB_PR_WEBHOOK_SECRET:-}
      TRELLO_GATEWAY_URL: ${TRELLO_GATEWAY_URL:-http://trello-gateway:18792}
      TRELLO_GATEWAY_KEY: ${TRELLO_GATEWAY_KEY:-}
      TRELLO_GATEWAY_AGENT_ID: ${TRELLO_GATEWAY_AGENT_ID:-system}
      TRELLO_BOARD_ID: ${TRELLO_BOARD_ID:-}
      TRELLO_INTAKE_LIST_ID: ${TRELLO_INTAKE_LIST_ID:-}
      TRELLO_DONE_LIST_NAMES: ${TRELLO_DONE_LIST_NAMES:-Done}
      OPENCLAW_HOOK_URL: ${OPENCLAW_HOOK_URL:-}
      OPENCLAW_HOOK_TOKEN: ${OPENCLAW_HOOK_TOKEN:-}
      OPENCLAW_HOOK_AGENT_ID: ${OPENCLAW_HOOK_AGENT_ID:-marcos}
      OPENCLAW_HOOK_SESSION_PREFIX: ${OPENCLAW_HOOK_SESSION_PREFIX:-hook:github-pr:}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_AGENT_VAULT_DIR:-/home/deploy/openclaw/data/agent-vault}:/home/node/.openclaw/agent-vault
      - ${OPENCLAW_AGENT_RUNTIME_DIR:-/home/deploy/openclaw/data/agent-runtime}:/home/node/.openclaw/agent-runtime
      - ./github-pr-bridge:/opt/github-pr-bridge:ro
    working_dir: /opt/github-pr-bridge
    command: ["node", "server.mjs"]
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:19091/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      openclaw-gateway:
        condition: service_started
      trello-gateway:
        condition: service_started

  gmail-hook-bridge:
    image: openclaw-with-gog:local
    network_mode: "service:openclaw-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      GMAIL_HOOK_BRIDGE_PORT: ${GMAIL_HOOK_BRIDGE_PORT:-19092}
      GMAIL_HOOK_MAX_BODY_BYTES: ${GMAIL_HOOK_MAX_BODY_BYTES:-262144}
      TRELLO_GATEWAY_URL: ${TRELLO_GATEWAY_URL:-http://trello-gateway:18792}
      TRELLO_GATEWAY_KEY: ${TRELLO_GATEWAY_KEY:-}
      TRELLO_GATEWAY_AGENT_ID: ${TRELLO_GATEWAY_AGENT_ID:-system}
      TRELLO_BOARD_ID: ${TRELLO_BOARD_ID:-}
      TRELLO_INTAKE_LIST_ID: ${TRELLO_INTAKE_LIST_ID:-}
      TRELLO_DONE_LIST_NAMES: ${TRELLO_DONE_LIST_NAMES:-Done}
      OPENCLAW_HOOK_URL: ${GMAIL_OPENCLAW_HOOK_URL:-http://127.0.0.1:18789/hooks/agent}
      OPENCLAW_HOOK_TOKEN: ${OPENCLAW_HOOK_TOKEN:-}
      OPENCLAW_HOOK_AGENT_ID: ${GMAIL_HOOK_AGENT_ID:-main}
      OPENCLAW_HOOK_SESSION_PREFIX: ${GMAIL_HOOK_SESSION_PREFIX:-hook:gmail:}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_AGENT_VAULT_DIR:-/home/deploy/openclaw/data/agent-vault}:/home/node/.openclaw/agent-vault
      - ${OPENCLAW_AGENT_RUNTIME_DIR:-/home/deploy/openclaw/data/agent-runtime}:/home/node/.openclaw/agent-runtime
      - ./gmail-hook-bridge:/opt/gmail-hook-bridge:ro
    working_dir: /opt/gmail-hook-bridge
    command: ["node", "server.mjs"]
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:19092/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      openclaw-gateway:
        condition: service_started
      trello-gateway:
        condition: service_started

  gog-canary-bridge:
    image: openclaw-with-gog:local
    network_mode: "service:openclaw-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      GOG_CANARY_BRIDGE_PORT: ${GOG_CANARY_BRIDGE_PORT:-19093}
      GOG_CANARY_CHECK_MS: ${GOG_CANARY_CHECK_MS:-300000}
      GOG_KEYRING_BACKEND: ${GOG_KEYRING_BACKEND:-file}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      GOG_ACCOUNT: ${GOG_ACCOUNT:-}
      TRELLO_GATEWAY_URL: ${TRELLO_GATEWAY_URL:-http://trello-gateway:18792}
      TRELLO_GATEWAY_KEY: ${TRELLO_GATEWAY_KEY:-}
      TRELLO_GATEWAY_AGENT_ID: ${TRELLO_GATEWAY_AGENT_ID:-system}
      TRELLO_BOARD_ID: ${TRELLO_BOARD_ID:-}
      TRELLO_INTAKE_LIST_ID: ${TRELLO_INTAKE_LIST_ID:-}
      TRELLO_DONE_LIST_NAMES: ${TRELLO_DONE_LIST_NAMES:-Done}
      OPENCLAW_HOOK_URL: ${GOG_CANARY_OPENCLAW_HOOK_URL:-http://127.0.0.1:18789/hooks/agent}
      OPENCLAW_HOOK_TOKEN: ${OPENCLAW_HOOK_TOKEN:-}
      OPENCLAW_HOOK_AGENT_ID: ${GOG_CANARY_HOOK_AGENT_ID:-main}
      OPENCLAW_HOOK_SESSION_PREFIX: ${GOG_CANARY_HOOK_SESSION_PREFIX:-hook:gog-canary:}
      GOG_CANARY_STATE_DIR: ${GOG_CANARY_STATE_DIR:-/var/lib/gog-canary-bridge}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_AGENT_VAULT_DIR:-/home/deploy/openclaw/data/agent-vault}:/home/node/.openclaw/agent-vault
      - ${OPENCLAW_AGENT_RUNTIME_DIR:-/home/deploy/openclaw/data/agent-runtime}:/home/node/.openclaw/agent-runtime
      - ./gog-canary-bridge:/opt/gog-canary-bridge:ro
      - ${GOG_CANARY_HOST_STATE_DIR:-/home/deploy/openclaw/data/gog-canary-bridge}:/var/lib/gog-canary-bridge
    working_dir: /opt/gog-canary-bridge
    command: ["node", "server.mjs"]
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:19093/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      openclaw-gateway:
        condition: service_started
      trello-gateway:
        condition: service_started

  trello-gateway:
    build:
      context: ./trello-gateway
      dockerfile: Dockerfile
    image: trello-gateway:local
    env_file:
      - path: ./trello-gateway/.env
        required: true
    environment:
      BIND: "0.0.0.0"
      TRELLO_PIPELINE_STATE_DIR: ${TRELLO_PIPELINE_STATE_DIR:-/var/lib/trello-pipeline}
    volumes:
      - ./trello-gateway/trello_gateway.mjs:/app/trello_gateway.mjs:ro
      - ./trello-gateway/trello_card_contract.mjs:/app/trello_card_contract.mjs:ro
      - ./trello-gateway/trello_transition_matrix.csv:/app/trello_transition_matrix.csv:ro
      - ${TRELLO_PIPELINE_HOST_STATE_DIR:-/home/deploy/openclaw/data/trello-pipeline}:/var/lib/trello-pipeline
    ports:
      - "127.0.0.1:18792:18792"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18792/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      # trello-gateway builds from source and starts slower than bridge containers that depend on it;
      # without a start_period, Docker marks it unhealthy before it has a chance to respond,
      # causing github-pr-bridge (which depends_on trello-gateway healthy) to never start.
      start_period: 60s

  # Trello queue worker monitor — respawns trello_queue_worker.mjs on crash.
  # Belt-and-suspenders with hooks/trello-queue-worker-start (gateway:startup).
  trello-queue-worker:
    image: openclaw-with-gog:local
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
      TRELLO_GATEWAY_URL: ${TRELLO_GATEWAY_URL:-http://trello-gateway:18792}
      TRELLO_GATEWAY_KEY: ${TRELLO_GATEWAY_KEY:-}
      OPENCLAW_TRELLO_QUEUE_WORKER_SERVICE: "1"
      GOG_KEYRING_BACKEND: ${GOG_KEYRING_BACKEND:-file}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      GOG_ACCOUNT: ${GOG_ACCOUNT:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-adriellpz@gmail.com}
      TRELLO_PIPELINE_STATE_DIR: ${TRELLO_PIPELINE_STATE_DIR:-/var/lib/trello-pipeline}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ./trello-pipeline:/opt/trello-pipeline:ro
      - ./shared:/opt/shared:ro
      - ${TRELLO_PIPELINE_HOST_STATE_DIR:-/home/deploy/openclaw/data/trello-pipeline}:/var/lib/trello-pipeline
    working_dir: /opt/trello-pipeline
    command: ["node", "start_queue_worker.mjs"]
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_started
      trello-gateway:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('node:fs');const s=process.env.TRELLO_PIPELINE_STATE_DIR||'/var/lib/trello-pipeline';function alive(p){try{process.kill(Number(fs.readFileSync(p,'utf8').trim()),0);return true}catch{return false}};for(const f of['start_queue_worker.pid','queue_worker.pid']){if(!alive(`$${s}/$${f}`))process.exit(1)}process.exit(0)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  trello-routines:
    image: openclaw-with-gog:local
    network_mode: "service:openclaw-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      XDG_CONFIG_HOME: ${XDG_CONFIG_HOME:-/home/node/.openclaw}
      TRELLO_GATEWAY_URL: ${TRELLO_GATEWAY_URL:-http://trello-gateway:18792}
      TRELLO_GATEWAY_KEY: ${TRELLO_GATEWAY_KEY:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-adriellpz@gmail.com}
      GOG_KEYRING_BACKEND: ${GOG_KEYRING_BACKEND:-file}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      GOG_ACCOUNT: ${GOG_ACCOUNT:-}
      TRELLO_ROUTINES_STATE_DIR: ${TRELLO_ROUTINES_STATE_DIR:-/var/lib/trello-routines}
      TRELLO_ROUTINES_LOOKAHEAD_DAYS: ${TRELLO_ROUTINES_LOOKAHEAD_DAYS:-14}
      TRELLO_ROUTINES_INTERVAL_SECONDS: ${TRELLO_ROUTINES_INTERVAL_SECONDS:-21600}
      TRELLO_ROUTINES_HEALTH_MAX_AGE_SECONDS: ${TRELLO_ROUTINES_HEALTH_MAX_AGE_SECONDS:-90000}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME:-/tmp}/.openclaw}:/home/node/.openclaw
      - ./trello-routines:/opt/trello-routines:ro
      - ${TRELLO_ROUTINES_HOST_STATE_DIR:-/home/deploy/openclaw/data/trello-routines}:/var/lib/trello-routines
    working_dir: /opt/trello-routines
    command: ["sh", "/opt/trello-routines/start_routines_loop.sh"]
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_started
      trello-gateway:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('node:fs');const p=(process.env.TRELLO_ROUTINES_STATE_DIR||'/var/lib/trello-routines')+'/last_run.json';const maxAge=(Number(process.env.TRELLO_ROUTINES_HEALTH_MAX_AGE_SECONDS||'90000')||90000)*1000;try{const data=JSON.parse(fs.readFileSync(p,'utf8'));const ts=Date.parse(data.finishedAt||data.startedAt||0);if(!Number.isFinite(ts)||Date.now()-ts>maxAge)process.exit(1);process.exit(data.status==='ok'||data.status==='running'?0:1)}catch{process.exit(1)}",
        ]
      interval: 30m
      timeout: 5s
      retries: 3
      start_period: 5m
